spring:
  application:
    name: dashboard

  # Disable Spring Boot's single-datasource auto-init; each DataSource is
  # initialised explicitly via DataSourceInitializer beans in DataSourceConfig.
  sql:
    init:
      mode: never

  # Two separate databases.
  # Dev defaults use H2 in-memory. Production: set env vars to Oracle/Tibero JDBC URLs.
  # Never commit real credentials — always supply via environment variables or a secrets manager.
  datasource:
    meta:
      url: ${META_DB_URL:jdbc:h2:mem:metadb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
      driver-class-name: ${META_DB_DRIVER:org.h2.Driver}
      username: ${META_DB_USER:sa}
      password: ${META_DB_PASSWORD:}
    target:
      url: ${TARGET_DB_URL:jdbc:h2:mem:targetdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
      driver-class-name: ${TARGET_DB_DRIVER:org.h2.Driver}
      username: ${TARGET_DB_USER:sa}
      password: ${TARGET_DB_PASSWORD:}

  h2:
    console:
      enabled: false

  # ── Distributed cache (Redis / Lettuce) ────────────────────────────────────
  # Dev default: localhost:6379 (no password).
  # Production: supply REDIS_HOST, REDIS_PORT, REDIS_PASSWORD via env / secrets manager.
  # Never commit real credentials here.
  data:
    redis:
      host:     ${REDIS_HOST:localhost}
      port:     ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout:  2000ms        # command timeout — fail-fast rather than blocking a request thread
      lettuce:
        pool:
          max-active: 16      # max concurrent Redis connections per node
          max-idle:    8
          min-idle:    2
          max-wait:    500ms  # time to wait for a pool slot before throwing an exception

server:
  port: 8081

# ── Widget deployment tuning ──────────────────────────────────────────────────
dashboard:
  widget:
    deploy:
      # Oracle/Tibero optimizer cost threshold. Queries whose root-node cost exceeds
      # this value are rejected at deploy time to prevent accidental full-table scans
      # from DoS-ing the Target DB connection pool. Tune via load-testing against
      # your specific schema; 10 000 is a conservative default for OLAP widgets.
      max-query-cost: ${MAX_QUERY_COST:10000.0}

logging:
  level:
    com.shb: DEBUG
    org.springframework.jdbc: DEBUG
